<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireSense AI PRO | Neural Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(100px);
        }

        .main-card {
            width: 100%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header-section {
            text-align: center;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .full-width { grid-column: span 3; }
        .span-2 { grid-column: span 2; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.9rem;
            color: white;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .upload-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .btn-execute {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-execute:hover {
            box-shadow: 0 0 40px var(--accent-glow);
            transform: translateY(-3px) scale(1.02);
        }

        /* Result Cards Styling */
        #results {
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .candidate-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            position: relative;
            transition: 0.3s;
        }

        .candidate-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }

        .rank-tag {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .match-score {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--success);
        }

        .skill-tag {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: #c7d2fe;
            padding: 4px 10px;
            margin: 4px 2px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .decision-badge {
            display: inline-block;
            margin: 10px 0;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .decision-badge.HIRE { background: rgba(74, 222, 128, 0.1); color: var(--success); }
        .decision-badge.REJECT { background: rgba(248, 113, 113, 0.1); color: var(--danger); }

        .section-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 12px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 850px) {
            .input-grid { grid-template-columns: 1fr; }
            .full-width, .span-2 { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="main-card">
        <div class="header-section">
            <div class="logo-text">🚀 HireSense AI PRO</div>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 8px;">Advanced Neural Recruitment Engine</p>
        </div>

        <div class="input-grid">
            <div class="input-group span-2">
                <label>Target Role</label>
                <input type="text" id="role-input" placeholder="e.g. Senior Software Architect">
            </div>
            <div class="input-group">
                <label>Top Candidates</label>
                <input type="number" id="count-input" value="5" min="1" max="20">
            </div>
            <div class="input-group span-2">
                <label>Required Skills</label>
                <textarea id="skills-input" rows="2" placeholder="React, Go, AWS, System Design..."></textarea>
            </div>
            <div class="input-group">
                <label>Seniority</label>
                <input type="text" id="seniority-input" placeholder="e.g. 5+ Years">
            </div>
            <div class="input-group full-width">
                <label>Resume Repository</label>
                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    <p id="file-status" style="font-size: 0.9rem;">Click to inject resumes into the neural network</p>
                    <input type="file" id="file-input" multiple accept=".pdf" style="display: none;" onchange="updateFileStatus(this)">
                </div>
            </div>
        </div>

        <button class="btn-execute" onclick="analyzeCandidates()">
            Execute Pro Analysis
        </button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: var(--accent); font-weight: 600;">Neural Processing...</p>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function updateFileStatus(input) {
            const status = document.getElementById('file-status');
            if (input.files.length > 0) {
                status.innerText = `READY: ${input.files.length} Data Sources Found`;
                status.style.color = "#4ade80";
            }
        }

        async function analyzeCandidates() {
            const resultsBox = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            const role = document.getElementById('role-input').value;
            const skills = document.getElementById('skills-input').value;
            const seniority = document.getElementById('seniority-input').value;
            const count = document.getElementById('count-input').value;
            const files = document.getElementById('file-input').files;

            if (files.length === 0) {
                alert("Please upload candidate data!");
                return;
            }

            loader.style.display = 'block';
            resultsBox.innerHTML = "";

            const fd = new FormData();
            fd.append("role", role);
            fd.append("skills", skills);
            fd.append("seniority", seniority);
            fd.append("top_n", count);

            for (let f of files) {
                fd.append("resumes", f);
            }

            try {
                const res = await fetch("http://127.0.0.1:8000/analyze", {
                    method: "POST",
                    body: fd
                });
                
                const data = await res.json();
                loader.style.display = 'none';

                let candidates = data.results || [];
                candidates.sort((a, b) => b.match - a.match);

                if (candidates.length === 0) {
                    resultsBox.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>No match found in current dataset.</p>";
                    return;
                }

                candidates.forEach((c, index) => {
                    const card = document.createElement('div');
                    card.className = 'candidate-card';

                    const skillsHTML = (c.skills || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
                    const strengths = (c.strengths || []).map(s => `• ${s}`).join('<br>');
                    const flags = (c.red_flags || []).map(r => `• ${r}`).join('<br>');
                    const decisionClass = c.decision.includes("REJECT") ? "REJECT" : "HIRE";

                    card.innerHTML = `
                        <div class="rank-tag">RANK #${index + 1}</div>
                        <div class="match-score">${c.match}%</div>
                        <h3 style="margin-top:10px;">${c.name}</h3>
                        <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:5px;">${c.title}</p>
                        
                        <div class="decision-badge ${decisionClass}">${c.decision}</div>
                        
                        <div style="margin-top:10px;">${skillsHTML}</div>

                        <div class="section-title">NEURAL SUMMARY</div>
                        <p style="font-size:0.85rem; line-height:1.4;">${c.summary}</p>

                        <div class="section-title">CORE STRENGTHS</div>
                        <p style="font-size:0.8rem; color:#4ade80;">${strengths}</p>

                        ${flags ? `<div class="section-title">RED FLAGS</div><p style="font-size:0.8rem; color:#f87171;">${flags}</p>` : ''}
                    `;
                    resultsBox.appendChild(card);
                });

            } catch (err) {
                loader.style.display = 'none';
                console.error(err);
                resultsBox.innerHTML = "<p style='color:var(--danger); text-align:center; grid-column:1/-1;'>Network Error: AI Server Offline</p>";
            }
        }
    </script>
</body>
</html>
